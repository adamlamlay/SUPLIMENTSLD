<section class="fb-reviews-section" id="reviews">

<style>
/* ============================================================
   FACEBOOK REVIEWS SLIDER — PERFECT AUTO SIZE
============================================================ */

.fb-reviews-section{
  background:linear-gradient(180deg,#faf4ec 0%,#f5edde 100%);
  padding:80px 0;
  overflow:hidden;
}

.fb-reviews-head{
  text-align:center;
  max-width:760px;
  margin:0 auto 46px;
}

.fb-reviews-head h2{
  margin-bottom:14px;
}

.fb-reviews-head p{
  font-size:1rem;
  color:#4a3f44;
}

.fb-reviews-head .rose{
  color:#B5485C;
}

.fb-icon{
  display:inline-flex;
  align-items:center;
  gap:10px;
  background:#1877F2;
  color:#fff;
  padding:9px 18px;
  border-radius:999px;
  font-size:.84rem;
  font-weight:700;
  margin-bottom:18px;
}

/* WRAPPER */
.fb-slider-wrap{
  position:relative;
  max-width:1280px;
  margin:0 auto;
  padding:0 70px;
}

/* VIEWPORT */
.fb-slider-viewport{
  overflow:hidden;
  width:100%;
}

/* TRACK */
.fb-slider-track{
  display:flex;
  align-items:flex-start;
  gap:24px;
  transition:transform .45s cubic-bezier(.4,0,.2,1);
}

/* CARD */
.fb-slide{
  flex:0 0 calc((100% - 48px) / 3);
  background:#fff;
  border-radius:18px;
  box-shadow:0 10px 32px rgba(0,0,0,.08);
  overflow:visible;
}

/* IMAGE WRAP */
.fb-slide-image{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:center;
  background:#fff;
}

/* IMPORTANT — AUTO SIZE */
.fb-slide-image img{
  width:100%;
  height:auto;
  display:block;
  object-fit:contain;
  border-radius:18px 18px 0 0;
}

/* CAPTION */
.fb-slide-caption{
  padding:16px;
  text-align:center;
  font-size:.82rem;
  color:#7b6e72;
  background:#faf4ec;
  border-top:1px solid #ece2d8;
  border-radius:0 0 18px 18px;
}

.fb-slide-caption strong{
  color:#1f1a1e;
}

/* ARROWS */
.fb-arrow{
  position:absolute;
  top:50%;
  transform:translateY(-50%);
  width:52px;
  height:52px;
  border-radius:50%;
  border:none;
  background:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  z-index:10;
  box-shadow:0 6px 18px rgba(0,0,0,.12);
  transition:.25s ease;
}

.fb-arrow:hover{
  background:#B5485C;
  color:#fff;
}

.fb-arrow.prev{
  left:0;
}

.fb-arrow.next{
  right:0;
}

.fb-arrow svg{
  width:22px;
  height:22px;
}

/* DOTS */
.fb-dots{
  display:flex;
  justify-content:center;
  gap:8px;
  margin-top:28px;
}

.fb-dot{
  width:9px;
  height:9px;
  border:none;
  border-radius:999px;
  background:#d7cec3;
  cursor:pointer;
  transition:.25s ease;
}

.fb-dot.active{
  width:28px;
  background:#B5485C;
}

/* TABLET */
@media(max-width:900px){

  .fb-slide{
    flex:0 0 calc((100% - 24px) / 2);
  }

  .fb-slider-wrap{
    padding:0 56px;
  }

}

/* MOBILE */
@media(max-width:600px){

  .fb-slide{
    flex:0 0 100%;
  }

  .fb-slider-wrap{
    padding:0 42px;
  }

}
</style>

<script>
const fbTrack = document.getElementById('fb-track');
const fbSlides = document.querySelectorAll('.fb-slide');
const fbPrev = document.getElementById('fb-prev');
const fbNext = document.getElementById('fb-next');
const fbDots = document.getElementById('fb-dots');

let fbIndex = 0;

/* RESPONSIVE */
function getSlidesPerView(){

  if(window.innerWidth < 600) return 1;

  if(window.innerWidth < 900) return 2;

  return 3;
}

/* MAX INDEX */
function getMaxIndex(){

  return fbSlides.length - getSlidesPerView();
}

/* UPDATE */
function updateFbSlider(){

  const gap = 24;

  const slideWidth =
    fbSlides[0].offsetWidth + gap;

  fbTrack.style.transform =
    `translateX(-${fbIndex * slideWidth}px)`;

  fbDots.innerHTML = '';

  const totalDots =
    getMaxIndex() + 1;

  for(let i = 0; i < totalDots; i++){

    const dot = document.createElement('button');

    dot.className =
      'fb-dot' + (i === fbIndex ? ' active' : '');

    dot.onclick = () => {

      fbIndex = i;

      updateFbSlider();
    };

    fbDots.appendChild(dot);
  }

  fbPrev.disabled = fbIndex === 0;

  fbNext.disabled =
    fbIndex >= getMaxIndex();
}

/* PREV */
fbPrev.addEventListener('click', () => {

  if(fbIndex > 0){

    fbIndex--;

    updateFbSlider();
  }

});

/* NEXT */
fbNext.addEventListener('click', () => {

  if(fbIndex < getMaxIndex()){

    fbIndex++;

    updateFbSlider();
  }

});

/* RESIZE */
window.addEventListener('resize', () => {

  fbIndex = 0;

  updateFbSlider();
});

/* AUTO SLIDE */
let autoSlide = setInterval(() => {

  if(fbIndex >= getMaxIndex()){

    fbIndex = 0;

  }else{

    fbIndex++;
  }

  updateFbSlider();

}, 4500);

/* PAUSE ON HOVER */
document.querySelector('.fb-slider-wrap')
.addEventListener('mouseenter', () => {

  clearInterval(autoSlide);

});

/* RESTART */
document.querySelector('.fb-slider-wrap')
.addEventListener('mouseleave', () => {

  autoSlide = setInterval(() => {

    if(fbIndex >= getMaxIndex()){

      fbIndex = 0;

    }else{

      fbIndex++;
    }

    updateFbSlider();

  }, 4500);

});

/* INIT */
updateFbSlider();
</script>
